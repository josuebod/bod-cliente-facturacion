<header class="panel-page-header flex items-center justify-between mb-6">
  <div class="panel-page-header-left flex items-center gap-2">
    @if (backRouterLink()) {
    <a [routerLink]="backRouterLink()">
      <p-button
        size="small"
        type="button"
        [text]="true"
        [rounded]="true"
        icon="pi pi-arrow-left"
      />
    </a>
    } @if (title() || description()) {
    <div class="flex flex-col gap-1">
      @if (title()) {
      <h1>{{ title() }}</h1>
      } @if (description()) {
      <p class="text-sm text-surface-500 dark:text-surface-400">
        {{ description() }}
      </p>
      }
    </div>
    }
  </div>
  <div class="panel-page-header-right flex items-center gap-2">
    <div class="hidden sm:flex items-center gap-2">
      @for (action of actions(); track $index) {
      <p-button
        type="button"
        [label]="action.label"
        [icon]="action.icon"
        (onClick)="action.command?.({
        originalEvent: $event,
          item: action,
          index: $index,
        })"
      />
      }
    </div>
  </div>
  <div class="sm:hidden">
    @if (actions().length > 0) {
    <p-button
      type="button"
      [text]="true"
      [rounded]="true"
      icon="pi pi-ellipsis-h"
      (onClick)="menu.toggle($event)"
    />
    <p-menu #menu [model]="actions()" [popup]="true" [appendTo]="'body'" />
    }
  </div>
</header>
