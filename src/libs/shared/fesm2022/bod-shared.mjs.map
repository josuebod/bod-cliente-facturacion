<div class="table-toolbar">
  @if (title()) {
  <div class="table-toolbar__title">
    <h2>{{ title() }}</h2>
  </div>
  }
  <!-- Row: search + actions (title always above on its own row) -->
  <div class="table-toolbar__row">
    <div class="table-toolbar__search">
      <bod-form-field [reserveMessagesSpace]="false">
        <bod-form-field-control>
          <p-icon-field>
            <input
              #searchInputRef
              (keyup.enter)="searchChange.emit(searchInputRef.value)"
              (input)="searchInput.next(searchInputRef.value)"
              pInputText
              type="text"
              [placeholder]="'common.search' | translate"
              class="w-full"
            />
            <p-inputicon class="pi pi-search" />
          </p-icon-field>
        </bod-form-field-control>
      </bod-form-field>
    </div>

    <!-- Actions: columns toggle + actions menu -->
    <div class="table-toolbar__actions">
      @if (columns().length > 0) {
      <p-button
        severity="secondary"
        [outlined]="true"
        (onClick)="columnsPopover.toggle($event)"
        icon="pi pi-cog"
        [label]="'shared.tableToolbar.columns' | translate"
        [attr.aria-label]="'shared.tableToolbar.columns' | translate"
        [attr.aria-haspopup]="true"
        [attr.aria-expanded]="columnsPopover.overlayVisible"
      ></p-button>
      <p-popover #columnsPopover>
        <div class="flex flex-col gap-3 p-1 min-w-48">
          @for (column of columns(); track column.key) {
          <label
            [for]="'col-' + column.key"
            class="flex cursor-pointer items-center gap-2 rounded p-2 transition-colors hover:bg-gray-100 dark:hover:bg-gray-800"
          >
            <p-checkbox
              [binary]="true"
              [ngModel]="columnIsChecked(column.key)"
              (ngModelChange)="onColumnChecked(column.key)"
              [inputId]="'col-' + column.key"
            />
            <span class="text-sm">{{ column.header | translate }}</span>
          </label>
          }
        </div>
      </p-popover>
      } @if (vistas().length > 0) {
      <p-select
        [options]="vistas()"
        optionLabel="nombre"
        optionValue="uuid"
        [ngModel]="selectedVista()"
        (ngModelChange)="selectedVistaChange.emit($event)"
      />
      } @if (actionsMenuItems().length > 0) {
      <p-button
        (onClick)="actionsMenu.toggle($event)"
        icon="pi pi-chevron-down"
        iconPos="right"
        [label]="'common.actions' | translate"
        severity="secondary"
        [outlined]="true"
        [attr.aria-label]="'common.actions' | translate"
        [attr.aria-haspopup]="true"
      ></p-button>
      <p-menu #actionsMenu [model]="actionsMenuItems()" [popup]="true" [appendTo]="'body'"></p-menu>
      }
    </div>
  </div>
</div>
