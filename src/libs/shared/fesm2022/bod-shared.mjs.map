<div class="form-dialog-wrapper flex flex-col gap-4">
  <ng-content></ng-content>
  <div class="form-dialog-wrapper-actions flex justify-end gap-2">
    <p-button
      severity="secondary"
      type="button"
      [label]="'common.cancel' | translate"
      icon="pi pi-times"
      (click)="cancel.emit()"
    />
    <p-button
      type="button"
      [label]="'common.save' | translate"
      icon="pi pi-check"
      (click)="save.emit()"
    />
  </div>
</div>
