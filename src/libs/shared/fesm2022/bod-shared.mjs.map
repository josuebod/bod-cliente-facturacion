<div class="flex justify-center items-center py-7 w-full">
  <div class="flex flex-col justify-center items-center gap-2">
    <div class="relative">
      <img width="400" [src]="iconSvg()" alt="Empty state" />
      <a
        target="_blank"
        class="text-xs text-gray-500"
        style="position: absolute; right: 0"
        [style.bottom.px]="image() === 'empty' ? 40 : 60"
        [href]="
          image() === 'empty'
            ? 'https://www.freepik.es/vector-gratis/dibujado-mano-ilustracion-datos_59563768.htm'
            : 'https://www.freepik.es/vector-gratis/dibujado-mano-ilustracion-error_59563731.htm'
        "
        >Designed by Freepik</a
      >
    </div>
    <p-message
      styleClass="w-70 flex justify-center items-center flex-wrap mb-4"
      [severity]="severity()"
      size="small"
    >
      {{ message() | translate }}
    </p-message>
    @if (retryFunction() || goBackFunction()) {
      <div class="flex gap-2">
        @if (retryFunction()) {
          <p-button
            outlined
            pButton
            type="button"
            icon="pi pi-refresh"
            [label]="'shared.emptyMessage.retry' | translate"
            (click)="onRetry()"
          />
        }
        @if (goBackFunction()) {
          <p-button
            severity="secondary"
            outlined
            pButton
            type="button"
            icon="pi pi-arrow-left"
            [label]="'shared.emptyMessage.back' | translate"
            (click)="onGoBack()"
          />
        }
      </div>
    }
  </div>
</div>
