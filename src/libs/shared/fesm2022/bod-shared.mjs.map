<div class="form-field" [class.form-field--inline]="inline()">
  @if (formFieldLabel()) {
  <div class="form-field-label-container flex items-center gap-2">
    <ng-content select="bod-form-field-label"></ng-content>
    @if (showRequiredIndicator()) { @if (controlIsRequired()) {
    <i class="pi pi-exclamation-circle text-red-500" aria-label="Required"
      [pTooltip]="'shared.formField.requiredTooltip' | translate"></i>
    } @else {
    <i class="pi pi-question-circle text-gray-500" aria-label="Optional"
      [pTooltip]="'shared.formField.optionalTooltip' | translate"></i>
    } }
  </div>
  } @if (formFieldControl()) {
  <div class="form-field-control-container">
    <ng-content select="bod-form-field-control"></ng-content>
    <div class="form-field-messages-container ml-2"
      [class.form-field-messages-container--dynamic]="!reserveMessagesSpace()">
      @if (shouldShowValidationErrors() && showValidationErrors() && innerControl()) {
      <bod-form-field-validation-errors [control]="innerControl()!" [customMessages]="customValidationMessages()" />
      } @else {
      <ng-content select="bod-form-field-hint"></ng-content>
      }
    </div>
  </div>
  }
</div>
